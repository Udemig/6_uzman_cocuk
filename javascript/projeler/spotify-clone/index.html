<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Clone</title>
    <!-- * Css Link -->
    <link rel="stylesheet" href="./styles/style.css" />
    <!-- * Bs Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="layout">
      <!-- Aside -->
      <aside>
        <!-- Logo -->
        <figure>
          <img src="./images/logo.png" alt="" />
          <span>Spotify</span>
        </figure>

        <!-- Navigation -->
        <nav>
          <a href="#">
            <i class="bi bi-house"></i>
            <span>Anasayfa</span>
          </a>

          <a href="#">
            <i class="bi bi-search"></i>
            <span>Arama</span>
          </a>
          <a href="#">
            <i class="bi bi-collection"></i>
            <span>Kütüphaneler</span>
          </a>

          <a href="#">
            <i class="bi bi-music-note-list"></i>
            <span>Çalma Listeleri</span>
          </a>
          <a href="#">
            <i class="bi bi-heart"></i>
            <span>Beğenilen Şarkılar</span>
          </a>
        </nav>
      </aside>
      <!-- Main -->
      <main>
        <!-- Header -->
        <header>
          <form>
            <input type="search" placeholder="müzik arayınız ..." />
            <button type="submit">
              <i class="bi bi-search"></i>
            </button>
          </form>
          <nav>
            <span>Premium</span>
            <span>Destek</span>
            <span>Oturum Aç</span>
          </nav>
        </header>

        <!-- Section -->
        <section>
          <h2 id="title">Popüler Müzikler</h2>
        </section>
      </main>
    </div>
    <!-- * Js Bağlantı -->
    <script src="./js/main.js" type="module"></script>
  </body>
</html>
