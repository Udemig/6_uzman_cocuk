<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kripto Dünyası</title>
    <!-- * Css Link -->
    <link rel="stylesheet" href="./styles/style.css" />

    <!-- * Font Awesome Link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- * Header -->
    <header>
      <nav class="nav container">
        <!-- Logo -->
        <a href="#" class="logo">Kripto Dünyası</a>

        <!-- Menu -->
        <div class="nav__menu" id="nav-menu">
          <ul class="nav__list">
            <li class="nav__item"><a href="#">Ana Sayfa</a></li>
            <li class="nav__item"><a href="#">Piyasa</a></li>
            <li class="nav__item"><a href="#">Özellikler</a></li>
            <li class="nav__item"><a href="#">İletişim</a></li>
          </ul>
          <!--  Close Icon -->
          <div class="nav__close" id="close-btn">
            <i class="fas fa-times"></i>
          </div>
        </div>
        <!-- Menu Icon -->
        <button class="nav__toggle" id="menu-btn">
          <i class="fa-solid fa-bars"></i>
        </button>
      </nav>
    </header>
    <!-- * Main -->
    <main>
      <!-- * Home -->
      <section id="home" class="hero">
        <div class="container">
          <div class="hero__content">
            <h1>Kripto Para Dünyasına Hoş Geldiniz</h1>
            <p>Güvenli ve hızlı kripto para alım satımı için doğru adres</p>
            <a href="#" class="btn">Hemen Başla</a>
          </div>
        </div>
      </section>
      <!-- * Market -->
      <section id="market" class="market">
        <div class="container">
          <h2>Popüler Kripto Paralar</h2>
          <!-- Wrapper -->
          <div class="crypto-grid">
            <!-- Crypto Card -->
            <div class="crypto-card">
              <img src="./assets/bitcoin.png" alt="" />
              <h3>Bitcoin</h3>
              <p class="price">$105,000</p>
              <div class="change positive">+5.2%</div>
            </div>
            <!-- Crypto Card -->
            <div class="crypto-card">
              <img src="./assets/ethereum.png" alt="" />
              <h3>Ethereum</h3>
              <p class="price">$3,200</p>
              <div class="change positive">+3.8%</div>
            </div>
            <!-- Crypto Card -->
            <div class="crypto-card">
              <img src="./assets/xrp.png" alt="" />
              <h3>Xrp</h3>
              <p class="price">$3,13</p>
              <div class="change negative">-5%</div>
            </div>
          </div>
        </div>
      </section>
      <!-- * Features -->
    </main>
    <!-- * Js Bağlantı -->
    <script src="./js/main.js"></script>
  </body>
</html>
